<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw-kenpon | AI Drawing Battle</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Main Container -->
    <div id="app" class="screen view-lobby">

        <!-- Premium Animated Background -->
        <div class="background-effects">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>

        <!-- Header / Baseline HUD (Visible during game) -->
        <header id="game-header" class="hidden">
            <div class="baseline-container">
                <div class="baseline-label">CURRENT BASELINE</div>
                <div id="baseline-value" class="baseline-text shadow-glow">Nothing</div>
                <div id="baseline-subtitle">Draw something stronger!</div>
            </div>

            <div class="status-bar">
                <div class="player-info p1-info">
                    <div class="score-circle p1-score" id="p1-score">0</div>
                    <div class="player-name">Player 1 <span id="p1-me-tag" class="me-tag hidden">(You)</span></div>
                    <div class="jolly-badge" id="p1-jolly-badge">JOLLY ACTIVE</div>
                </div>

                <div class="vs-center">
                    <div class="timer" id="round-timer">30</div>
                    <div class="vs-text">VS</div>
                </div>

                <div class="player-info p2-info">
                    <div class="jolly-badge" id="p2-jolly-badge">JOLLY ACTIVE</div>
                    <div class="player-name">Player 2 <span id="p2-me-tag" class="me-tag hidden">(You)</span></div>
                    <div class="score-circle p2-score" id="p2-score">0</div>
                </div>
            </div>
        </header>

        <!-- Screens System -->

        <!-- 1. Lobby Screen -->
        <section id="screen-lobby" class="panel glass active">
            <div class="logo-container">
                <h1 class="game-title glow-text">Draw-<span>kenpon</span></h1>
                <p class="subtitle">The Ultimate AI Drawing Battle</p>
            </div>
            <button id="btn-find-match" class="btn-primary pulse">FIND MATCH</button>
            <div class="mt-1">
                <label
                    style="font-size: 0.9em; opacity: 0.8; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px;">
                    <input type="checkbox" id="cb-use-imagen"
                        style="accent-color: var(--accent); width: 18px; height: 18px;">
                    🎨 Enable AI Cartoon Avatars (Takes longer)
                </label>
            </div>
            <div id="lobby-status" class="status-msg"></div>
        </section>

        <!-- 2. Main Game Area (Vertical Split as Requested) -->
        <section id="screen-game" class="hidden">
            <div class="split-container">

                <!-- Player 1 Side (Left) -->
                <div class="split-side p1-side" id="p1-area">
                    <div class="canvas-header">
                        <h2>Draw 1</h2>
                        <div class="side-status" id="p1-action-status">Waiting...</div>
                    </div>

                    <div class="canvas-wrapper">
                        <!-- Jolly Text Input -->
                        <div id="p1-jolly-overlay" class="jolly-input-overlay hidden">
                            <input type="text" id="p1-jolly-input" placeholder="Type your object (Jolly!)"
                                autocomplete="off" />
                        </div>

                        <!-- Drawing Canvas -->
                        <canvas id="canvas-p1" width="500" height="500"></canvas>

                        <!-- Block interaction if not me -->
                        <div class="block-overlay" id="p1-block-overlay"></div>
                    </div>

                    <div class="tools-panel" id="p1-tools">
                        <button class="btn-tool" id="btn-clear">Clear</button>
                        <button class="btn-tool btn-submit" id="btn-submit">Submit</button>
                    </div>
                </div>

                <!-- Divider -->
                <div class="divider"></div>

                <!-- Player 2 Side (Right) -->
                <div class="split-side p2-side" id="p2-area">
                    <div class="canvas-header">
                        <h2>Draw 2</h2>
                        <div class="side-status" id="p2-action-status">Waiting...</div>
                    </div>

                    <div class="canvas-wrapper">
                        <!-- Jolly Text Input -->
                        <div id="p2-jolly-overlay" class="jolly-input-overlay hidden">
                            <input type="text" id="p2-jolly-input" placeholder="Type your object (Jolly!)"
                                autocomplete="off" />
                        </div>

                        <!-- Drawing Canvas -->
                        <canvas id="canvas-p2" width="500" height="500"></canvas>

                        <!-- Block interaction if not me -->
                        <div class="block-overlay" id="p2-block-overlay"></div>
                    </div>

                    <div class="tools-panel" id="p2-tools">
                        <button class="btn-tool" id="btn-clear-2" disabled>Clear</button>
                        <button class="btn-tool btn-submit" id="btn-submit-2" disabled>Submit</button>
                    </div>
                </div>

            </div>
        </section>

        <!-- 3. Judging Screen Overlay -->
        <section id="screen-judging" class="overlay-glass hidden">
            <div class="judging-content panel">
                <h2 class="judging-title animated-pulse">AI IS JUDGING...</h2>
                <div class="clash-container">
                    <div class="clash-side">
                        <div id="p1-avatar-container" class="avatar-container hidden"></div>
                        <div class="clash-item" id="judge-p1-desc">?</div>
                    </div>
                    <div class="clash-vs">VS</div>
                    <div class="clash-side">
                        <div id="p2-avatar-container" class="avatar-container hidden"></div>
                        <div class="clash-item" id="judge-p2-desc">?</div>
                    </div>
                </div>
                <div class="judging-verdict" id="judging-verdict"></div>
                <div class="judging-expl" id="judging-expl"></div>

                <div id="next-round-container" class="mt-2 hidden">
                    <button id="btn-next-round" class="btn-primary">NEXT ROUND</button>
                    <div id="judging-status" class="status-msg"></div>
                </div>
            </div>
        </section>

        <!-- 4. Game Over Screen -->
        <section id="screen-game-over" class="overlay-glass full-overlay hidden">
            <div class="panel text-center">
                <h1 class="game-over-title" id="game-over-title">GAME OVER</h1>
                <p id="game-over-subtitle" class="subtitle">Match Ended</p>
                <div class="final-scores">
                    <div class="fs-item">P1: <span id="final-p1-score">0</span></div>
                    <div class="fs-item">P2: <span id="final-p2-score">0</span></div>
                </div>
                <button id="btn-play-again" class="btn-primary mt-2">PLAY AGAIN</button>
            </div>
        </section>

    </div>

    <!-- Main Logic -->
    <script src="/static/app.js?v=2"></script>
</body>

</html>
